<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gromnie — The Codex of Monitoria</title>
    <link rel="stylesheet" href="./css/theme.css" />
    <style>
      /* ── App Shell Styles ── */
      #ascii-header {
        text-align: center;
        margin-bottom: var(--sp-4);
        user-select: none;
        line-height: 1.15;
      }
      #ascii-header pre {
        font-family: var(--font-body);
        font-size: 0.65rem;
        color: var(--codex-gold-dim);
        display: inline-block;
        text-align: left;
      }
      #ascii-header .title-text {
        font-family: var(--font-display);
        font-size: 1.6rem;
        color: var(--codex-gold);
        letter-spacing: 0.08em;
        margin: var(--sp-2) 0 var(--sp-1);
        text-shadow: 0 0 20px rgba(212, 168, 67, 0.15);
      }
      #ascii-header .subtitle-text {
        font-family: var(--font-display);
        font-size: 0.85rem;
        color: var(--codex-text-dim);
        font-style: italic;
        margin-bottom: var(--sp-2);
      }
      #bottom-ornament {
        text-align: center;
        color: var(--codex-border);
        font-size: 0.75rem;
        user-select: none;
        margin-top: auto;
        padding-top: var(--sp-4);
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div id="ascii-header">
<pre class="ornament-gold">
      ╔═╗╔═╗╔╦╗╔═╗╦═╗╔╦╗
      ║  ║ ║║║║║╣ ╠╦╝ ║
      ╚═╝╚═╝╩ ╩╚═╝╩╚═ ╩
</pre>
        <div class="title-text">The Codex of Monitoria</div>
        <div class="subtitle-text">~ a browser gateway to the world of Asheron ~</div>
        <div class="ornament">╔══════════════════════════════════════════════════════════╗</div>
      </div>

      <gromnie-status-bar></gromnie-status-bar>

      <div id="main-area">
        <div id="account-view" class="active">
          <gromnie-login-form></gromnie-login-form>
        </div>

        <div id="character-view">
          <gromnie-character-select></gromnie-character-select>
        </div>

        <div id="world-view">
          <gromnie-world-view></gromnie-world-view>
        </div>
      </div>

      <gromnie-log-viewer></gromnie-log-viewer>

      <div id="bottom-ornament">
        ╚══════════════════════════════════════════════════════════╝
      </div>
    </div>

    <gromnie-error-overlay></gromnie-error-overlay>

    <script type="module" src="./main.js"></script>
  </body>
</html>
