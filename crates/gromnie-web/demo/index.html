<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="wisp-host" content="__WISP_HOST__" />
    <title>gromnie-web demo</title>
    <style>
      :root { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
      * { box-sizing: border-box; }
      body { margin: 0.5rem; }
      h1 { margin: 0 0 0.5rem; font-size: 1rem; }
      .status-bar { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
      .status-item { padding: 0.3rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.75rem; background: #f8f8f8; }
      .status-item .label { color: #888; }
      .main-area { border: 1px solid #ddd; padding: 0.5rem; border-radius: 4px; min-height: 12rem; margin-bottom: 0.5rem; }
      .main-area > div { display: none; }
      .main-area > div.active { display: block; }
      .section { border: 1px solid #ddd; padding: 0.5rem; border-radius: 4px; }
      .row { display: grid; grid-template-columns: 4.5rem 1fr; gap: 0.25rem; margin-bottom: 0.25rem; align-items: center; }
      input { width: 100%; padding: 0.2rem 0.3rem; font-size: 0.85rem; font-family: inherit; }
      .actions { display: flex; gap: 0.4rem; margin-top: 0.4rem; }
      button { padding: 0.25rem 0.5rem; font-size: 0.85rem; font-family: inherit; }
      #char-list { font-size: 0.8rem; color: #666; }
      .tabs { display: flex; gap: 0; margin-bottom: 0; }
      .tab { padding: 0.25rem 0.6rem; border: 1px solid #ccc; border-bottom: none; cursor: pointer; font-size: 0.75rem; background: #f5f5f5; border-radius: 3px 3px 0 0; }
      .tab.active { background: #fff; border-bottom: 1px solid #fff; margin-bottom: -1px; }
      .tab-content { border: 1px solid #ccc; padding: 0.3rem; height: calc(100vh - 14rem); overflow-y: auto; white-space: pre-wrap; font-size: 0.7rem; display: none; }
      .tab-content.active { display: block; }
      #error-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
      #error-overlay.active { display: flex; }
      #error-box { background: #fff; border: 2px solid #c44; border-radius: 6px; padding: 1.2rem; max-width: 20rem; text-align: center; }
      #error-box h3 { margin: 0 0 0.5rem; color: #c44; }
      #error-box p { margin: 0 0 0.8rem; }
      #char-list div:hover { background: #eef !important; }
    </style>
  </head>
  <body>
    <h1>gromnie-web browser demo</h1>

    <div class="status-bar">
      <div class="status-item" id="wasm-status"><span class="label">WASM</span> loading...</div>
      <div class="status-item" id="proxy-status"><span class="label">Proxy</span> --</div>
    </div>

    <div class="main-area" id="main-area">
      <div id="account-view" class="active">
        <h2 style="margin-top:0;">Account Info</h2>
        <div class="row">
          <label for="host">host</label>
          <input id="host" />
        </div>
        <div class="row">
          <label for="port">port</label>
          <input id="port" value="9000" />
        </div>
        <div class="row">
          <label for="account">account</label>
          <input id="account" />
        </div>
        <div class="row">
          <label for="password">password</label>
          <input id="password" type="password" />
        </div>
        <div class="actions">
          <button id="login" disabled>Login</button>
          <button id="reset-form" type="button">Reset</button>
        </div>
      </div>

      <div id="character-view">
        <h2 style="margin-top:0;">Character Select</h2>
        <div id="char-list"></div>
        <div class="actions">
          <button id="enter-world" disabled>Enter World</button>
        </div>
      </div>

      <div id="world-view">
        <div id="world-char-name" style="font-weight: bold; margin-bottom: 0.3rem; color: #333;"></div>
        <div id="chat-messages" style="border: 1px solid #ccc; padding: 0.35rem; height: calc(20 * 1.2em + 0.7rem); width: calc(80 * 0.65ch + 0.7rem); overflow-y: auto; white-space: pre-wrap; font-size: 0.75rem; margin-bottom: 0.3rem;"></div>
        <div style="display: flex; gap: 0.25rem; width: calc(80 * 0.65ch + 0.7rem);">
          <input id="chat-input" placeholder="Type a message..." style="flex: 1;" />
          <button id="chat-send">Send</button>
        </div>
        <div class="actions" style="margin-top: 0.35rem;">
          <button id="exit-world">Exit World</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="tabs">
        <div class="tab active" data-tab="all">All</div>
        <div class="tab" data-tab="game">Game</div>
        <div class="tab" data-tab="protocol">Protocol</div>
        <div class="tab" data-tab="state">State</div>
        <div class="tab" data-tab="system">System</div>
        <div class="tab" data-tab="network">Network</div>
      </div>
      <pre id="log-all" class="tab-content active" aria-live="polite"></pre>
      <pre id="log-game" class="tab-content"></pre>
      <pre id="log-protocol" class="tab-content"></pre>
      <pre id="log-state" class="tab-content"></pre>
      <pre id="log-system" class="tab-content"></pre>
      <pre id="net-log" class="tab-content" style="background: #111; color: #0f0;"></pre>
    </div>

    <div id="error-overlay">
      <div id="error-box">
        <h3>Login Failed</h3>
        <p id="error-message"></p>
        <button id="error-ok">OK</button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
