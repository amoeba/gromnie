<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gromnie-web demo</title>
    <style>
      :root { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
      * { box-sizing: border-box; }
      body { margin: 0.5rem; }
      h1 { margin: 0 0 0.5rem; font-size: 1rem; }
      .main-area {
        border: 1px solid #ddd;
        padding: 0.5rem;
        border-radius: 4px;
        min-height: 12rem;
        margin-bottom: 0.5rem;
      }
      .main-area > div { display: none; }
      .main-area > div.active { display: block; }
    </style>
  </head>
  <body>
    <h1>gromnie-web browser demo</h1>

    <gromnie-status-bar></gromnie-status-bar>

    <div class="main-area" id="main-area">
      <div id="account-view" class="active">
        <gromnie-login-form></gromnie-login-form>
      </div>

      <div id="character-view">
        <gromnie-character-select></gromnie-character-select>
      </div>

      <div id="world-view">
        <gromnie-world-view></gromnie-world-view>
      </div>
    </div>

    <gromnie-log-viewer></gromnie-log-viewer>

    <gromnie-error-overlay></gromnie-error-overlay>

    <script type="module" src="./main.js"></script>
  </body>
</html>
