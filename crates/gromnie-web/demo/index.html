<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gromnie-web demo</title>
    <style>
      :root { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      body { margin: 1rem; max-width: 64rem; }
      h1 { margin: 0 0 1rem; font-size: 1.1rem; }
      h2 { margin: 1rem 0 0.5rem; font-size: 0.95rem; color: #555; }
      .row { display: grid; grid-template-columns: 8rem 1fr; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
      input { width: 100%; box-sizing: border-box; padding: 0.3rem; }
      .actions { display: flex; gap: 0.5rem; margin: 0.8rem 0; }
      button { padding: 0.35rem 0.65rem; }
      pre { border: 1px solid #ccc; padding: 0.5rem; min-height: 12rem; max-height: 30rem; overflow-y: auto; white-space: pre-wrap; font-size: 0.75rem; }
      .section { border: 1px solid #ddd; padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 4px; }
      .tabs { display: flex; gap: 0; margin-bottom: 0; }
      .tab { padding: 0.35rem 0.75rem; border: 1px solid #ccc; border-bottom: none; cursor: pointer; font-size: 0.8rem; background: #f5f5f5; border-radius: 4px 4px 0 0; }
      .tab.active { background: #fff; border-bottom: 1px solid #fff; margin-bottom: -1px; }
      .tab-content { border: 1px solid #ccc; padding: 0.5rem; min-height: 10rem; max-height: 20rem; overflow-y: auto; white-space: pre-wrap; font-size: 0.75rem; display: none; }
      .tab-content.active { display: block; }
    </style>
  </head>
  <body>
    <h1>gromnie-web browser demo</h1>

    <div class="section">
      <h2>Connection</h2>
      <div class="row">
        <label for="ws-url">ws_url</label>
        <input id="ws-url" />
      </div>
      <div class="row">
        <label for="host">host</label>
        <input id="host" value="play.coldeve.ac" />
      </div>
      <div class="row">
        <label for="account">account</label>
        <input id="account" />
      </div>
      <div class="row">
        <label for="password">password</label>
        <input id="password" type="password" />
      </div>
      <div class="actions">
        <button id="login" disabled>Login</button>
      </div>
    </div>

    <div class="section">
      <h2>Character</h2>
      <div id="char-list" style="margin-bottom: 0.5rem; font-size: 0.85rem; color: #666;">(waiting for character list...)</div>
      <div class="actions">
        <button id="select-char" disabled>Select Character</button>
      </div>
    </div>

    <div class="section">
      <h2>Network</h2>
      <pre id="net-log" style="min-height: 8rem; max-height: 24rem; font-size: 0.7rem; background: #111; color: #0f0;"></pre>
    </div>

    <div class="section">
      <h2>Events</h2>
      <div class="tabs">
        <div class="tab active" data-tab="all">All</div>
        <div class="tab" data-tab="game">Game</div>
        <div class="tab" data-tab="protocol">Protocol</div>
        <div class="tab" data-tab="state">State</div>
        <div class="tab" data-tab="system">System</div>
      </div>
      <pre id="log-all" class="tab-content active" aria-live="polite"></pre>
      <pre id="log-game" class="tab-content"></pre>
      <pre id="log-protocol" class="tab-content"></pre>
      <pre id="log-state" class="tab-content"></pre>
      <pre id="log-system" class="tab-content"></pre>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
